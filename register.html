<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Registrasi Customer - Network Equipment Store">
    <title>Register - Network Equipment Store</title>
    <link rel="icon" href="public/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>

    <!-- ============================================= -->
    <!-- HALAMAN REGISTER - Redesign Premium -->
    <!-- ============================================= -->
    <div class="auth-page">
        <div class="auth-card">
            <!-- Logo -->
            <div class="auth-logo">
                <img src="public/uploads/profile/LOGO_NES.png" alt="NES Logo">
            </div>

            <h1 class="auth-title">Buat Akun Baru</h1>
            <p class="auth-subtitle">Daftar untuk mulai berbelanja perangkat jaringan</p>

            <div id="register-alert" style="display:none;"></div>

            <form id="register-form" onsubmit="handleRegisterSubmit(event)">
                <div class="auth-form-group">
                    <label class="form-label">Nama Lengkap</label>
                    <input type="text" id="reg-nama" class="form-control" placeholder="Masukkan nama lengkap" required>
                </div>

                <div class="auth-form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="reg-email" class="form-control" placeholder="email@contoh.com" required>
                </div>

                <div class="auth-form-group">
                    <label class="form-label">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="reg-password" class="form-control" placeholder="Buat password (min. 3 karakter)" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('reg-password', this)">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="auth-form-group">
                    <label class="form-label">Konfirmasi Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="reg-confirm" class="form-control" placeholder="Ulangi password Anda" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('reg-confirm', this)">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-green" style="margin-top:8px;">
                    <i class="bi bi-person-plus" style="margin-right:6px;"></i> Daftar Sekarang
                </button>
            </form>

            <div class="auth-divider"><span>sudah punya akun?</span></div>

            <p class="auth-link" style="margin-top:0;"><a href="login.html">Login di sini</a></p>
        </div>
    </div>

    <script src="assets/js/data.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        /** Fitur: Handle register customer */
        function handleRegisterSubmit(e) {
            e.preventDefault();
            const nama = document.getElementById("reg-nama").value;
            const email = document.getElementById("reg-email").value;
            const password = document.getElementById("reg-password").value;
            const confirm = document.getElementById("reg-confirm").value;
            const alertDiv = document.getElementById("register-alert");

            if (password !== confirm) {
                alertDiv.style.display = "block";
                alertDiv.className = "auth-alert auth-alert-danger";
                alertDiv.innerHTML = '<i class="bi bi-exclamation-circle-fill"></i> Password tidak cocok!';
                return;
            }

            const result = registerCustomer(nama, email, password);
            alertDiv.style.display = "block";
            if (result.success) {
                alertDiv.className = "auth-alert auth-alert-success";
                alertDiv.innerHTML = '<i class="bi bi-check-circle-fill"></i> ' + result.message;
                setTimeout(() => { window.location.href = "login.html"; }, 1200);
            } else {
                alertDiv.className = "auth-alert auth-alert-danger";
                alertDiv.innerHTML = '<i class="bi bi-exclamation-circle-fill"></i> ' + result.message;
            }
        }

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector("i");
            if (input.type === "password") { input.type = "text"; icon.className = "bi bi-eye-slash"; }
            else { input.type = "password"; icon.className = "bi bi-eye"; }
        }
    </script>
</body>
</html>
