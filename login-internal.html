<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login Admin & Owner - Network Equipment Store Internal">
    <title>Login Internal - NES Admin</title>
    <link rel="icon" href="public/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>

    <!-- ============================================= -->
    <!-- HALAMAN LOGIN ADMIN & OWNER - Dark Premium -->
    <!-- Background gelap dengan grid pattern dan glow -->
    <!-- ============================================= -->
    <div class="auth-page-dark">
        <div class="auth-card-dark">
            <!-- Shield Icon -->
            <div class="auth-shield-icon">
                <div class="shield">
                    <i class="bi bi-shield-lock-fill"></i>
                </div>
            </div>

            <h1 class="auth-title">Admin Panel</h1>
            <p class="auth-subtitle">Akses terbatas untuk Admin & Owner NES</p>

            <div id="internal-alert" style="display:none;"></div>

            <form id="internal-form" onsubmit="handleInternalLogin(event)">
                <div class="auth-form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="int-email" class="form-control" placeholder="admin@gmail.com" required>
                </div>

                <div class="auth-form-group">
                    <label class="form-label">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="int-password" class="form-control" placeholder="Masukkan password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('int-password', this)" style="color:#64748b;">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-admin" style="margin-top:8px;">
                    <i class="bi bi-shield-check" style="margin-right:6px;"></i> Login Sekarang
                </button>
            </form>

            <div class="back-link">
                <a href="login.html"><i class="bi bi-arrow-left"></i> Kembali ke Login Customer</a>
            </div>
        </div>
    </div>

    <script src="assets/js/data.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        /** Fitur: Handle login admin/owner dengan redirect */
        function handleInternalLogin(e) {
            e.preventDefault();
            const email = document.getElementById("int-email").value;
            const password = document.getElementById("int-password").value;
            const alertDiv = document.getElementById("internal-alert");

            const result = loginInternal(email, password);
            alertDiv.style.display = "block";
            if (result.success) {
                alertDiv.className = "auth-alert auth-alert-success";
                alertDiv.innerHTML = '<i class="bi bi-check-circle-fill"></i> ' + result.message;
                const session = getSession();
                localStorage.setItem("nes_notify", JSON.stringify({ type: "login", nama: session ? session.nama : "" }));
                setTimeout(() => { window.location.href = result.redirect; }, 900);
            } else {
                alertDiv.className = "auth-alert auth-alert-danger";
                alertDiv.innerHTML = '<i class="bi bi-exclamation-circle-fill"></i> ' + result.message;
            }
        }

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector("i");
            if (input.type === "password") { input.type = "text"; icon.className = "bi bi-eye-slash"; }
            else { input.type = "password"; icon.className = "bi bi-eye"; }
        }

        if (isLoggedIn()) {
            const role = getUserRole();
            if (role === "Admin") window.location.href = "admin/dashboard.html";
            if (role === "Owner") window.location.href = "owner/dashboard.html";
        }
    </script>
</body>
</html>
